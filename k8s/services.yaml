# --- AUTH SERVICE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.28
          command: [ 'sh', '-c', "until nc -zv auth-db-service 5432; do echo 'Waiting for database...'; sleep 2; done;" ]
      containers:
        - name: auth-service
          image: docker-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: AUTH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AUTH_DATABASE_URL
            - name: PORT
              value: "3001"
            - name: MAIL_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MAIL_USER
            - name: MAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MAIL_PASS
          command: ["sh", "-c"]
          args:
            - >
              npx prisma generate --schema=apps/auth-service/prisma/schema.prisma &&
              npx prisma db push --schema=apps/auth-service/prisma/schema.prisma &&
              node dist/apps/auth-service/main.js
          livenessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 60  # Збільшено
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 40  # Збільшено
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"        # Збільшено
            limits:
              cpu: "500m"
              memory: "512Mi"        # Збільшено критично

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP

