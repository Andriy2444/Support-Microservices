name: Docker CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Clients
        run: |
          npx prisma generate --schema=apps/auth-service/prisma/schema.prisma
          npx prisma generate --schema=apps/users-service/prisma/schema.prisma
          npx prisma generate --schema=apps/tickets-service/prisma/schema.prisma

      - name: Run ESLint
        run: npm run lint -- --ignore-pattern '**/generated/**'

  tests:
    # needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Environments
        run: |
          mkdir -p docker
          cat <<EOF > docker/.env
          AUTH_SV_PORT=${{ secrets.AUTH_SV_PORT }}
          USERS_SV_PORT=${{ secrets.USERS_SV_PORT }}
          TICKETS_SV_PORT=${{ secrets.TICKETS_SV_PORT }}
          AUTH_DB_NAME=${{ secrets.AUTH_DB_NAME }}
          AUTH_DB_USER=${{ secrets.AUTH_DB_USER }}
          AUTH_DB_PASSWORD=${{ secrets.AUTH_DB_PASSWORD }}
          AUTH_DB_PORT=${{ secrets.AUTH_DB_PORT }}
          USERS_DB_NAME=${{ secrets.USERS_DB_NAME }}
          USERS_DB_USER=${{ secrets.USERS_DB_USER }}
          USERS_DB_PASSWORD=${{ secrets.USERS_DB_PASSWORD }}
          USERS_DB_PORT=${{ secrets.USERS_DB_PORT }}
          TICKETS_DB_NAME=${{ secrets.TICKETS_DB_NAME }}
          TICKETS_DB_USER=${{ secrets.TICKETS_DB_USER }}
          TICKETS_DB_PASSWORD=${{ secrets.TICKETS_DB_PASSWORD }}
          TICKETS_DB_PORT=${{ secrets.TICKETS_DB_PORT }}
          EOF

      - name: Build and Run Tests
        run: |
          cd docker
          docker compose up -d --build
          sleep 15
          # docker compose exec -T tickets-service npm run test
          # docker compose exec -T auth-service npm run test
          # docker compose exec -T users-service npm run test

      - name: Cleanup
        if: always()
        run: |
          cd docker
          docker compose down

  build-and-push:
    # needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Tickets
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/tickets-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tickets-service:${{ steps.vars.outputs.sha_short }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tickets-service:latest

      - name: Build and Push Users
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/users-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/users-service:${{ steps.vars.outputs.sha_short }}
            ${{ secrets.DOCKERHUB_USERNAME }}/users-service:latest

      - name: Build and Push Auth
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/auth-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:${{ steps.vars.outputs.sha_short }}
            ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest

      - name: Build and Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api-gateway/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ steps.vars.outputs.sha_short }}
            ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest

  deploy:
    # needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy to Cluster
        run: |
          TAG=${{ needs.build-and-push.outputs.tag }}
          USER=${{ secrets.DOCKERHUB_USERNAME }}
          
          kubectl set image deployment/tickets-deployment tickets-container=$USER/tickets-service:$TAG
          kubectl set image deployment/users-deployment users-container=$USER/users-service:$TAG
          kubectl set image deployment/auth-deployment auth-container=$USER/auth-service:$TAG
          kubectl set image deployment/api-gateway-deployment gateway-container=$USER/api-gateway:$TAG
          
          kubectl rollout status deployment/tickets-deployment
          kubectl rollout status deployment/users-deployment
          kubectl rollout status deployment/auth-deployment
          kubectl rollout status deployment/api-gateway-deployment
